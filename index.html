<!DOCTYPE html>
<html>
<head>
<title>Flavours Of Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#f2f2f2;
}

header {
    background:#ff6f00;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
}

.searchBar {
    padding:10px;
    background:white;
}

.searchBar input {
    width:100%;
    padding:10px;
    border-radius:25px;
    border:1px solid #ccc;
}

.categories {
    display:flex;
    overflow-x:auto;
    background:white;
    padding:10px;
}

.categories button {
    margin-right:10px;
    padding:8px 15px;
    border:none;
    border-radius:20px;
    background:#eee;
}

.products {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
    gap:15px;
    padding:15px;
    padding-bottom:140px; /* ✅ IMPORTANT SPACE */
}

.card {
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.card img {
    width:100%;
    height:150px;
    object-fit:cover;
}

.card-body {
    padding:10px;
}

.price {
    color:#388e3c;
    font-weight:bold;
}

.qty {
    display:flex;
    justify-content:space-between;
    margin:10px 0;
}

.qty button {
    width:30px;
    height:30px;
    border:none;
    background:#ddd;
}

.addBtn {
    width:100%;
    background:#ff6f00;
    color:white;
    padding:8px;
    border:none;
    border-radius:6px;
}

/* CART BAR */
.cartBar {
    position:fixed;
    bottom:0;
    width:100%;
    background:#388e3c;
    color:white;
    padding:12px;
    display:flex;
    justify-content:space-between;
    transition: transform 0.3s ease;
}

.cartBar.hide {
    transform: translateY(100%);
}

/* CART BOX */
.cartBox {
    position:fixed;
    right:-350px;
    top:0;
    width:300px;
    height:100%;
    background:white;
    padding:15px;
    box-shadow:-2px 0 10px gray;
    transition:0.3s;
    overflow:auto;
}

.cartBox.open {
    right:0;
}

.cartItem {
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.cartItem button {
    background:red;
    color:white;
    border:none;
    border-radius:5px;
}

/* FORM */
.formBox {
    margin-top:15px;
}

.formBox input,
.formBox textarea {
    width:100%;
    margin-bottom:8px;
    padding:8px;
}

#toast {
    position:fixed;
    bottom:100px;
    left:50%;
    transform:translateX(-50%);
    background:#333;
    color:white;
    padding:12px 20px;
    border-radius:25px;
    display:none;
}
</style>
</head>

<body>

<header>Flavours Of Home 🍲</header>

<div class="searchBar">
    <input type="text" placeholder="Search..." onkeyup="searchProducts(this.value)">
</div>

<div class="categories">
    <button onclick="filter('all')">All</button>
    <button onclick="filter('podi')">Powders</button>
    <button onclick="filter('pickle')">Pickles</button>
    <button onclick="filter('special')">Special</button>
</div>

<div class="products" id="products"></div>

<div class="cartBar" onclick="toggleCart()">
    <span id="cartCount">0 items</span>
    <span>₹<span id="total">0</span> → View Cart</span>
</div>

<div class="cartBox" id="cartBox">
    <button onclick="toggleCart()" style="position:absolute;top:10px;right:10px;">X</button>

    <h3>Your Cart</h3>
    <div id="cartItems"></div>
    <h4>Total: ₹<span id="total2">0</span></h4>

    <div class="formBox">
        <input type="text" id="custName" placeholder="Your Name">
        <input type="tel" id="custPhone" placeholder="Phone Number">
        <textarea id="custAddress" placeholder="Delivery Address"></textarea>
    </div>

    <button onclick="checkout()">Order on WhatsApp</button>
</div>

<div id="toast"></div>

<script>

const items = [
["putnalu","Putnalu Podi",140,"podi"],
["palli","Palli Podi",160,"podi"],
["nalla","Nalla Podi",160,"podi"],
["kandi","Kandi Podi",150,"podi"],
["karivepaku","Karivepaku Podi",130,"podi"],
["pulihora","Pulihora Mix",140,"podi"],
["sambar","Sambar Powder",150,"podi"],
["rasam","Rasam Powder",150,"podi"],
["garam","Garam Masala",150,"podi"],
["tomato","Tomato Pickle",280,"pickle"],
["gongura","Gongura Pickle",330,"pickle"],
["ginger","Ginger Pickle",330,"pickle"],
["avakaya","Avakaya Pickle",330,"pickle"],
["chicken","Chicken Pickle",640,"pickle"],
["plant","Protein Powder",900,"special"]
];

let filtered=[...items];
let cart={};

function render(){
let html="";
filtered.forEach(i=>{
html+=`
<div class="card">
<img src="${i[0]}.jpg">
<div class="card-body">
<h3>${i[1]}</h3>
<div class="price">₹${i[2]}</div>

<div class="qty">
<button onclick="qty('${i[0]}',-1)">-</button>
<span id="${i[0]}">1</span>
<button onclick="qty('${i[0]}',1)">+</button>
</div>

<button id="btn_${i[0]}" class="addBtn" onclick="add('${i[0]}','${i[1]}',${i[2]})">Add</button>
</div>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function qty(id,val){
let el=document.getElementById(id);
let q=parseInt(el.innerText)+val;
if(q<1) q=1;
el.innerText=q;
}

function add(id,name,price){
let q=parseInt(document.getElementById(id).innerText);
cart[id]={name,price,qty:q};

document.getElementById("btn_"+id).innerText="Added ✔";
document.getElementById("btn_"+id).style.background="#388e3c";

showToast(name+" added");
updateCart();
}

function updateCart(){
let html="",total=0,count=0;

for(let k in cart){
let i=cart[k];
let sub=i.qty*i.price;
total+=sub;
count+=i.qty;

html+=`
<div class="cartItem">
<span>${i.name} (${i.qty}) - ₹${sub}</span>
<button onclick="removeItem('${k}')">❌</button>
</div>`;
}

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
document.getElementById("total2").innerText=total;
document.getElementById("cartCount").innerText=count+" items";
}

function removeItem(id){
delete cart[id];
let btn=document.getElementById("btn_"+id);
if(btn){
btn.innerText="Add";
btn.style.background="#ff6f00";
}
updateCart();
showToast("Item removed");
}

function toggleCart(){
document.getElementById("cartBox").classList.toggle("open");
}

function checkout(){
let name=document.getElementById("custName").value;
let phone=document.getElementById("custPhone").value;
let addr=document.getElementById("custAddress").value;

if(!name || !phone || !addr){
alert("Please fill all details");
return;
}

let msg="Order Details:%0A";
msg+="Name: "+name+"%0A";
msg+="Phone: "+phone+"%0A";
msg+="Address: "+addr+"%0A%0A";

for(let k in cart){
let i=cart[k];
msg+=i.name+" - "+i.qty+" pcs - ₹"+(i.qty*i.price)+"%0A";
}

msg+="Total: ₹"+document.getElementById("total").innerText;

window.open("https://wa.me/918978992637?text="+msg);
}

function filter(type){
filtered = type=="all" ? [...items] : items.filter(i=>i[3]==type);
render();
}

function searchProducts(text){
filtered=items.filter(i=>i[1].toLowerCase().includes(text.toLowerCase()));
render();
}

function showToast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>{t.style.display="none";},2000);
}

/* ✅ AUTO HIDE CART BAR */
let lastScroll = 0;
const cartBar = document.querySelector(".cartBar");

window.addEventListener("scroll", () => {
let currentScroll = window.pageYOffset;

if (currentScroll > lastScroll) {
cartBar.classList.add("hide"); // scroll down
} else {
cartBar.classList.remove("hide"); // scroll up
}

lastScroll = currentScroll;
});

window.onload=render;
</script>

</body>
</html>
