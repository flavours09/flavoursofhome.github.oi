<!DOCTYPE html>
<html>
<head>
<title>Flavours Of Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin:0;
    font-family: Arial;
    background:#f7f7f7;
}

header {
    background:#2e7d32;
    color:white;
    padding:15px;
    text-align:center;
}

.products {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap:15px;
    padding:15px;
}

.card {
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px #ccc;
}

.card img {
    width:100%;
    height:180px;
    object-fit:cover;
}

.qty {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-top:8px;
}

.qty button {
    width:30px;
    height:30px;
    font-size:18px;
}

.addBtn {
    background:#25D366;
    color:white;
    padding:8px;
    border:none;
    width:100%;
    margin-top:8px;
    cursor:pointer;
}

.cartBox {
    position:fixed;
    top:10px;
    right:10px;
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}
</style>
</head>

<body>

<header>
<h1>Flavours Of Home</h1>
<p>Homemade Goodness</p>
</header>

<div class="cartBox">
🛒 Cart: <span id="cartCount">0</span><br>
<button onclick="checkout()">Order</button>
</div>

<div class="products">

<!-- PRODUCT TEMPLATE -->

<script>
const items = [
["putnalu","Putnalu Podi"],
["palli","Palli Podi"],
["nalla","Nalla Podi"],
["kandi","Kandi Podi"],
["karivepaku","Karivepaku Podi"],
["pulihora","Pulihora Mix"],
["sambar","Sambar Powder"],
["rasam","Rasam Powder"],
["garam","Garam Masala"],
["tomato","Tomato Pickle"],
["gongura","Gongura Pickle"],
["ginger","Ginger Pickle"],
["avakaya","Avakaya Pickle"],
["chicken","Chicken Pickle"],
["plant","Plant Protein"]
];

let cart = {};
let total = 0;

function render(){
    let html="";
    items.forEach(i=>{
        html += `
        <div class="card">
        <img src="${i[0]}.jpg">
        <h3>${i[1]}</h3>

        <div class="qty">
        <button onclick="changeQty('${i[0]}',-1)">-</button>
        <span id="${i[0]}">0</span>
        <button onclick="changeQty('${i[0]}',1)">+</button>
        </div>

        <button class="addBtn" onclick="addToCart('${i[1]}','${i[0]}')">Add to Cart</button>
        </div>
        `;
    });
    document.querySelector(".products").innerHTML = html;
}

function changeQty(id,val){
    let el=document.getElementById(id);
    let q=parseInt(el.innerText)+val;
    if(q<0) q=0;
    el.innerText=q;
}

function addToCart(name,id){
    let q=parseInt(document.getElementById(id).innerText);
    if(q==0){
        alert("Select quantity");
        return;
    }

    cart[name]=q;
    total+=q;

    document.getElementById("cartCount").innerText=total;
}

function checkout(){
    let msg="Hi I want to order:%0A";
    for(let i in cart){
        msg+=i+" - "+cart[i]+"%0A";
    }

    window.open("https://wa.me/918978992637?text="+msg);
}

window.onload=render;
</script>

</div>

</body>
</html>
