<!DOCTYPE html>
<html>
<head>
<title>Flavours Of Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family: Arial; background:#f5f5f5; }

header {
    background:#2e7d32;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
}

.searchBar {
    padding:10px;
    text-align:center;
}

.searchBar input {
    width:90%;
    padding:10px;
    border-radius:20px;
    border:1px solid #ccc;
}

.filters {
    text-align:center;
    margin-bottom:10px;
}

.filters button {
    margin:5px;
    padding:8px 12px;
    border:none;
    border-radius:5px;
    background:#ddd;
    cursor:pointer;
}

.products {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card {
    background:white;
    border-radius:12px;
    padding:10px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img {
    width:100%;
    height:180px;
    object-fit:cover;
}

.qty {
    display:flex;
    justify-content:center;
    gap:10px;
    margin:10px 0;
}

.qty button {
    width:30px;
    height:30px;
}

.addBtn {
    background:#ff9800;
    color:white;
    padding:8px;
    border:none;
    width:100%;
    border-radius:6px;
}

.cartBtn {
    position:fixed;
    top:15px;
    right:15px;
    background:#ff9800;
    color:white;
    padding:10px;
    border-radius:50%;
    cursor:pointer;
}

.cartBox {
    position:fixed;
    right:-350px;
    top:0;
    width:300px;
    height:100%;
    background:white;
    box-shadow:-2px 0 10px gray;
    padding:15px;
    transition:0.3s;
    overflow:auto;
}

.cartItem {
    margin-bottom:10px;
}

.total {
    font-weight:bold;
    margin-top:10px;
}
</style>
</head>

<body>

<header>Flavours Of Home 🍲</header>

<div class="searchBar">
<input type="text" placeholder="Search products..." onkeyup="searchProducts(this.value)">
</div>

<div class="filters">
<button onclick="filter('all')">All</button>
<button onclick="filter('podi')">Powders</button>
<button onclick="filter('pickle')">Pickles</button>
<button onclick="filter('special')">Special</button>
</div>

<div class="cartBtn" onclick="toggleCart()">🛒</div>

<div class="products" id="products"></div>

<div class="cartBox" id="cartBox">
<h3>Your Cart</h3>
<div id="cartItems"></div>
<div class="total">Total: ₹<span id="total">0</span></div>
<button onclick="checkout()">Order</button>
</div>

<script>
const items = [
["putnalu","Putnalu Podi",140,"podi"],
["palli","Palli Podi",160,"podi"],
["nalla","Nalla Podi",160,"podi"],
["kandi","Kandi Podi",150,"podi"],
["karivepaku","Karivepaku Podi",130,"podi"],
["pulihora","Pulihora Mix",140,"podi"],
["sambar","Sambar Powder",150,"podi"],
["rasam","Rasam Powder",150,"podi"],
["garam","Garam Masala",150,"podi"],

["tomato","Tomato Pickle",280,"pickle"],
["gongura","Gongura Pickle",330,"pickle"],
["ginger","Ginger Pickle",330,"pickle"],
["avakaya","Avakaya Pickle",330,"pickle"],
["chicken","Chicken Pickle",640,"pickle"],

["plant","Protein Powder",900,"special"]
];

let filtered = [...items];
let cart = {};

function render(){
    let html="";
    filtered.forEach(i=>{
        html+=`
        <div class="card">
        <img src="${i[0]}.jpg">
        <h3>${i[1]}</h3>
        <p>₹${i[2]}</p>

        <div class="qty">
        <button onclick="qty('${i[0]}',-1)">-</button>
        <span id="${i[0]}">1</span>
        <button onclick="qty('${i[0]}',1)">+</button>
        </div>

        <button class="addBtn" onclick="add('${i[0]}','${i[1]}',${i[2]})">Add</button>
        </div>
        `;
    });
    document.getElementById("products").innerHTML=html;
}

function qty(id,val){
    let el=document.getElementById(id);
    let q=parseInt(el.innerText)+val;
    if(q<1) q=1;
    el.innerText=q;
}

function add(id,name,price){
    let q=parseInt(document.getElementById(id).innerText);

    if(cart[id]){
        cart[id].qty+=q;
    } else {
        cart[id]={name,price,qty:q};
    }

    updateCart();
}

function updateCart(){
    let html="";
    let total=0;

    for(let k in cart){
        let i=cart[k];
        let sub=i.qty*i.price;
        total+=sub;

        html+=`
        <div class="cartItem">
        ${i.name} (${i.qty}) - ₹${sub}
        <button onclick="removeItem('${k}')">❌</button>
        </div>
        `;
    }

    document.getElementById("cartItems").innerHTML=html;
    document.getElementById("total").innerText=total;
}

function removeItem(id){
    delete cart[id];
    updateCart();
}

function toggleCart(){
    let box=document.getElementById("cartBox");
    box.style.right = (box.style.right=="0px") ? "-350px" : "0px";
}

function checkout(){
    let msg="Hi I want:%0A";
    for(let k in cart){
        let i=cart[k];
        msg+=i.name+" - "+i.qty+" pcs - ₹"+(i.qty*i.price)+"%0A";
    }
    msg+="Total: ₹"+document.getElementById("total").innerText;

    window.open("https://wa.me/918978992637?text="+msg);
}

function filter(type){
    if(type=="all") filtered=[...items];
    else filtered=items.filter(i=>i[3]==type);
    render();
}

function searchProducts(text){
    filtered = items.filter(i=>i[1].toLowerCase().includes(text.toLowerCase()));
    render();
}

window.onload=render;
</script>

</body>
</html>
