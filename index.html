<!DOCTYPE html>
<html>
<head>
<title>Flavours Of Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#f5f5f5;
}

header {
    background:#2e7d32;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
}

.products {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card {
    background:white;
    border-radius:12px;
    padding:10px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img {
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}

.card h3 {
    margin:10px 0 5px;
}

.qty {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin:10px 0;
}

.qty button {
    width:30px;
    height:30px;
    font-size:18px;
    border:none;
    background:#ddd;
    cursor:pointer;
}

.add {
    background:#ff9800;
    color:white;
    border:none;
    padding:8px;
    width:100%;
    border-radius:6px;
    cursor:pointer;
}

.cartBox {
    position:fixed;
    bottom:15px;
    right:15px;
    background:#2e7d32;
    color:white;
    padding:12px;
    border-radius:10px;
}

</style>
</head>

<body>

<header>
Flavours Of Home 🍲
</header>

<div class="products">

<!-- PRODUCT TEMPLATE -->

<script>
const products = [
"putnalu","palli","nalla","kandi","karivepaku","pulihora",
"sambar","rasam","garam",
"tomato","gongura","ginger","avakaya","chicken","plant"
];

const names = {
putnalu:"Putnalu Podi",
palli:"Palli Podi",
nalla:"Nalla Podi",
kandi:"Kandi Podi",
karivepaku:"Karivepaku Podi",
pulihora:"Pulihora Mix",
sambar:"Sambar Powder",
rasam:"Rasam Powder",
garam:"Garam Masala",
tomato:"Tomato Pickle",
gongura:"Gongura Pickle",
ginger:"Ginger Pickle",
avakaya:"Avakaya Pickle",
chicken:"Chicken Pickle",
plant:"Protein Powder"
};

let cart = {};
let total = 0;

function render(){
    let html = "";
    products.forEach(p=>{
        html += `
        <div class="card">
            <img src="${p}.jpg">
            <h3>${names[p]}</h3>

            <div class="qty">
                <button onclick="qty('${p}',-1)">-</button>
                <span id="${p}">0</span>
                <button onclick="qty('${p}',1)">+</button>
            </div>

            <button class="add" onclick="add('${p}')">Add to Cart</button>
        </div>
        `;
    });
    document.querySelector(".products").innerHTML = html;
}

function qty(id,val){
    let el = document.getElementById(id);
    let v = parseInt(el.innerText)+val;
    if(v<0) v=0;
    el.innerText = v;
}

function add(id){
    let q = parseInt(document.getElementById(id).innerText);
    if(q==0){ alert("Select quantity"); return; }

    cart[id]=q;
    total += q;
    document.getElementById("cartCount").innerText = total;
}

function checkout(){
    let msg="Hi I want:%0A";
    for(let k in cart){
        msg += names[k]+" - "+cart[k]+"%0A";
    }
    window.open("https://wa.me/918978992637?text="+msg);
}

window.onload = render;
</script>

</div>

<div class="cartBox">
🛒 <span id="cartCount">0</span>
<button onclick="checkout()">Order</button>
</div>

</body>
</html>
