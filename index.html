<!DOCTYPE html>
<html>
<head>
<title>Flavours Of Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family:'Segoe UI',sans-serif; background:#f2f2f2; }

header {
    background:#ff6f00;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.cartHeader {
    background:#2e7d32;
    padding:6px 12px;
    border-radius:20px;
    cursor:pointer;
    font-size:14px;
}

#cartBadge {
    background:red;
    border-radius:50%;
    padding:2px 6px;
    margin-left:5px;
}

/* SEARCH */
.searchBar { padding:10px; background:white; }
.searchBar input {
    width:100%;
    padding:10px;
    border-radius:25px;
    border:1px solid #ccc;
}

/* PRODUCTS */
.products {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    padding:15px;
    padding-bottom:100px;
}

.card {
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.12);
}

.card img {
    width:100%;
    height:160px;
    object-fit:cover;
}

.special img {
    object-fit:contain;
    padding:10px;
}

.card-body { padding:10px; }

.price { color:#B12704; font-weight:bold; }

.qty {
    display:flex;
    justify-content:space-between;
    margin:8px 0;
}

.addBtn {
    width:100%;
    background:#FFD814;
    border:none;
    padding:8px;
    border-radius:20px;
    font-weight:600;
    cursor:pointer;
}

.addBtn.added {
    background:#43a047 !important;
    color:white !important;
}

/* MINI CART */
.miniCart {
    display:none;
    position:absolute;
    top:60px;
    right:10px;
    background:white;
    color:black;
    padding:10px;
    border-radius:10px;
    width:220px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
.cartHeader:hover .miniCart { display:block; }

/* 🔥 FULL SCREEN CART */
.cartBox {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:white;
    padding:20px;
    transition:0.3s;
    overflow:auto;
    z-index:10000;

    transform:translateY(100%);
}

.cartBox.open {
    transform:translateY(0);
}

/* BIG CLOSE BUTTON */
.closeBtn {
    font-size:22px;
    background:none;
    border:none;
    cursor:pointer;
    margin-bottom:10px;
}

/* FORM */
.formBox input, .formBox textarea {
    width:100%;
    margin-bottom:8px;
    padding:8px;
}

/* TOAST */
#toast {
    position:fixed;
    bottom:100px;
    left:50%;
    transform:translateX(-50%);
    background:#333;
    color:white;
    padding:10px 20px;
    border-radius:20px;
    display:none;
}
</style>
</head>

<body>

<header>
    <div>Flavours Of Home 🍲</div>

    <div class="cartHeader" onclick="toggleCart()">
        🛒 Cart <span id="cartBadge">0</span>
        <div class="miniCart" id="miniCart"></div>
    </div>
</header>

<div class="searchBar">
<input type="text" placeholder="Search..." onkeyup="searchProducts(this.value)">
</div>

<div class="products" id="products"></div>

<!-- CART -->
<div class="cartBox" id="cartBox">

<!-- ✅ BIG BUTTON -->
<button class="closeBtn" onclick="toggleCart()">⬅ Back</button>

<h3>Your Cart</h3>
<div id="cartItems"></div>
<h4>Total ₹<span id="total2">0</span></h4>

<div class="formBox">
<input type="text" id="custName" placeholder="Your Name">
<input type="tel" id="custPhone" placeholder="Phone Number"
oninput="this.value=this.value.replace(/[^0-9+ ]/g,'')">
<textarea id="custAddress" placeholder="Delivery Address"></textarea>
</div>

<button onclick="checkout()">Order on WhatsApp</button>

</div>

<div id="toast"></div>

<script>

const items = [
["putnalu","Putnalu Podi",140,"podi"],
["palli","Palli Podi",160,"podi"],
["plant","Protein Powder",900,"special"]
];

let cart = JSON.parse(localStorage.getItem("cart")) || {};
let filtered=[...items];

function render(){
let html="";
filtered.forEach(i=>{
let cls=i[3]=="special"?"special":"";

html+=`
<div class="card ${cls}">
<img src="${i[0]}.jpg">

<div class="card-body">
<h3>${i[1]}</h3>
<div class="price">₹${i[2]}</div>

<div class="qty">
<button onclick="qty('${i[0]}',-1)">-</button>
<span id="${i[0]}">1</span>
<button onclick="qty('${i[0]}',1)">+</button>
</div>

<button id="btn_${i[0]}" class="addBtn"
onclick="add('${i[0]}','${i[1]}',${i[2]})">Add</button>
</div>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function qty(id,val){
let el=document.getElementById(id);
let q=parseInt(el.innerText)+val;
if(q<1) q=1;
el.innerText=q;
}

function add(id,name,price){
let q=parseInt(document.getElementById(id).innerText);
cart[id]={name,price,qty:q};

let btn=document.getElementById("btn_"+id);
btn.classList.add("added");
btn.innerText="Added ✔";

showToast(name+" added");
updateCart();
}

function removeItem(id){
delete cart[id];
updateCart();
}

function updateCart(){
let html="",mini="",total=0,count=0;

for(let k in cart){
let i=cart[k];
let sub=i.qty*i.price;
total+=sub;
count+=i.qty;

html+=`<div>${i.name} x${i.qty} - ₹${sub}</div>`;
mini+=`<div>${i.name} x${i.qty}</div>`;
}

document.getElementById("cartItems").innerHTML=html;
document.getElementById("miniCart").innerHTML=mini;
document.getElementById("total2").innerText=total;
document.getElementById("cartBadge").innerText=count;

localStorage.setItem("cart", JSON.stringify(cart));
}

function toggleCart(){
document.getElementById("cartBox").classList.toggle("open");
}

function checkout(){
alert("Order placed");
}

function searchProducts(text){
filtered=items.filter(i=>i[1].toLowerCase().includes(text.toLowerCase()));
render();
}

function showToast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

window.onload = function(){
render();
updateCart();
};

</script>

</body>
</html>
