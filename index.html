<!DOCTYPE html>
<html>
<head>
<title>Flavours Of Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin:0;
    font-family: Arial;
    background:#f7f7f7;
}

header {
    background:#2e7d32;
    color:white;
    padding:15px;
    text-align:center;
}

.container {
    padding:15px;
}

.products {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap:15px;
}

.card {
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px #ccc;
}

.card img {
    width:100%;
    height:180px;
    object-fit:cover;
}

button {
    background:#25D366;
    color:white;
    padding:8px;
    border:none;
    width:100%;
    margin-top:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>Flavours Of Home</h1>
<p>Homemade Goodness</p>
</header>

<div class="container">
<div class="products">

<div class="card"><img src="putnalu.jpg"><h3>Putnalu Podi</h3><button onclick="order('Putnalu Podi')">Order</button></div>
<div class="card"><img src="palli.jpg"><h3>Palli Podi</h3><button onclick="order('Palli Podi')">Order</button></div>
<div class="card"><img src="nalla.jpg"><h3>Nalla Podi</h3><button onclick="order('Nalla Podi')">Order</button></div>
<div class="card"><img src="kandi.jpg"><h3>Kandi Podi</h3><button onclick="order('Kandi Podi')">Order</button></div>
<div class="card"><img src="karivepaku.jpg"><h3>Karivepaku Podi</h3><button onclick="order('Karivepaku Podi')">Order</button></div>
<div class="card"><img src="pulihora.jpg"><h3>Pulihora Mix</h3><button onclick="order('Pulihora Mix')">Order</button></div>
<div class="card"><img src="sambar.jpg"><h3>Sambar Powder</h3><button onclick="order('Sambar Powder')">Order</button></div>
<div class="card"><img src="rasam.jpg"><h3>Rasam Powder</h3><button onclick="order('Rasam Powder')">Order</button></div>
<div class="card"><img src="garam.jpg"><h3>Garam Masala</h3><button onclick="order('Garam Masala')">Order</button></div>

<div class="card"><img src="tomato.jpg"><h3>Tomato Pickle</h3><button onclick="order('Tomato Pickle')">Order</button></div>
<div class="card"><img src="gongura.jpg"><h3>Gongura Pickle</h3><button onclick="order('Gongura Pickle')">Order</button></div>
<div class="card"><img src="ginger.jpg"><h3>Ginger Pickle</h3><button onclick="order('Ginger Pickle')">Order</button></div>
<div class="card"><img src="avakaya.jpg"><h3>Avakaya Pickle</h3><button onclick="order('Avakaya Pickle')">Order</button></div>
<div class="card"><img src="chicken.jpg"><h3>Chicken Pickle</h3><button onclick="order('Chicken Pickle')">Order</button></div>

<div class="card"><img src="plant.jpg"><h3>Plant Protein Powder</h3><button onclick="order('Plant Protein')">Order</button></div>

</div>
</div>

<script>
function order(product){
    window.open("https://wa.me/918978992637?text=Hi%20I%20want%20to%20order%20"+product);
}
</script>

</body>
</html>
